---
# Local domain for DNS resolution
dns_domain: "lab.local"

# Upstream DNS server (for non-local queries)
dns_upstream: "192.168.173.1"

# Interface to listen on (empty = all interfaces)
dns_listen_interface: ""

# Local hosts to register for DNS resolution
dns_hosts:
  - hostname: leader
    ip: 192.168.173.50
  # Add more hosts as needed:
  # - hostname: bastion-vm
  #   ip: 192.168.173.51
