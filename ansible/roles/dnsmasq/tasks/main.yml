---
- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: present
    update_cache: true

- name: Disable systemd-resolved (conflicts with dnsmasq)
  ansible.builtin.systemd:
    name: systemd-resolved
    state: stopped
    enabled: false
  ignore_errors: true

- name: Deploy dnsmasq configuration
  ansible.builtin.template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsmasq

- name: Ensure dnsmasq.d directory exists
  ansible.builtin.file:
    path: /etc/dnsmasq.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy local hosts file
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/dnsmasq.d/hosts.{{ dns_domain }}
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsmasq

- name: Ensure dnsmasq service is enabled and running
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started
